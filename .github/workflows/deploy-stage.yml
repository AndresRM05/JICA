# .github/workflows/deploy-stage.yml
name: Deploy Stage
 
on:
  push:
    branches:
      - develop
 
jobs:
  validate:
    name: Validación y análisis estático
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
 
      - name: Instalar dependencias
        run: npm ci
 
      - name: Verificar tipos TypeScript
        run: npm run type-check
 
      - name: Lint
        run: npm run lint
 
      - name: Verificar formato
        run: npm run format:check
 
  test:
    name: Pruebas unitarias y cobertura
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: frontend
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
 
      - name: Instalar dependencias
        run: npm ci
 
      - name: Pruebas con cobertura
        run: npm run test:coverage
        # Bloquea si la cobertura cae por debajo de los thresholds definidos en vite.config.ts
 
  e2e:
    name: Pruebas E2E
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: frontend
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
 
      - name: Instalar dependencias
        run: npm ci
 
      - name: Instalar browsers de Playwright
        run: npx playwright install --with-deps chromium
 
      - name: Pruebas E2E contra stage
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGE_BASE_URL }}
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
 
  build-and-deploy:
    name: Build y deploy a stage
    runs-on: ubuntu-latest
    needs: e2e
    defaults:
      run:
        working-directory: frontend
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
 
      - name: Instalar dependencias
        run: npm ci
 
      - name: Build
        run: npm run build
        env:
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.VITE_AZURE_TENANT_ID }}
          VITE_AZURE_REDIRECT_URI: ${{ secrets.STAGE_VITE_AZURE_REDIRECT_URI }}
          VITE_AZURE_API_SCOPE: ${{ secrets.VITE_AZURE_API_SCOPE }}
          VITE_API_BASE_URL: ${{ secrets.STAGE_API_BASE_URL }}
          VITE_SOCKET_URL: ${{ secrets.STAGE_SOCKET_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_INACTIVITY_TIMEOUT_MS: ${{ secrets.VITE_INACTIVITY_TIMEOUT_MS }}
 
      - name: Deploy a Azure Static Web Apps — stage
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN_STAGE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist